<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F0F0F">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Newsletter · MoMar Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin-2026-05-15.css">
  <style>
    /* Estilos locales para esta vista */
    .nl-table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid var(--color-line, #E5E1DA); }
    .nl-table th, .nl-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--color-line, #E5E1DA); font-size: 14px; vertical-align: middle; }
    .nl-table th { background: var(--color-bg-alt, #F5F2EC); font-weight: 600; font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; color: var(--color-text-soft, #7A736B); }
    .nl-table tbody tr:hover { background: rgba(0,0,0,0.02); }
    .nl-table tbody tr.is-deleting { opacity: 0.4; pointer-events: none; }
    .nl-email { font-weight: 500; }
    .nl-ua { color: var(--color-text-soft, #7A736B); font-size: 12px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nl-fecha { color: var(--color-text-soft, #7A736B); font-size: 13px; white-space: nowrap; }
    .nl-origen { font-size: 11px; padding: 3px 8px; background: var(--color-bg-alt, #F5F2EC); border-radius: 999px; letter-spacing: 0.3px; }
    .nl-actions { text-align: right; white-space: nowrap; }
    .nl-btn-del { background: transparent; border: 1px solid var(--color-line, #E5E1DA); color: var(--color-text-soft, #7A736B); padding: 6px 10px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .nl-btn-del:hover { background: #B33; color: #fff; border-color: #B33; }
    .nl-empty { padding: 60px 20px; text-align: center; color: var(--color-text-soft); }
    .nl-empty__icon { font-size: 36px; margin-bottom: 12px; }
    .nl-loading { padding: 60px 20px; text-align: center; color: var(--color-text-soft); }

    /* Modal de service_role */
    .nl-modal { position: fixed; inset: 0; background: rgba(15,15,15,0.6); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .nl-modal.is-open { display: flex; }
    .nl-modal__inner { background: #fff; max-width: 540px; width: 100%; padding: 32px; border-radius: 4px; }
    .nl-modal h2 { margin: 0 0 12px; font-size: 22px; }
    .nl-modal p { color: var(--color-text-soft, #7A736B); font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
    .nl-modal input { width: 100%; padding: 10px 12px; font-family: monospace; font-size: 12px; border: 1px solid var(--color-line, #E5E1DA); margin-bottom: 16px; }
    .nl-modal__actions { display: flex; gap: 8px; justify-content: flex-end; }
    .nl-error { background: #FEE; color: #B33; padding: 12px 16px; border-left: 3px solid #B33; margin-bottom: 16px; font-size: 13px; }
    .nl-help { font-size: 11px; color: var(--color-text-soft); padding: 12px; background: var(--color-bg-alt); margin-top: 12px; }
  </style>
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-side"></aside>
    <div>
      <div class="admin-topbar"></div>
      <main class="admin-main">

        <div class="admin-main__head">
          <h1>Newsletter <span class="js-total-count u-text-soft u-fw-400 u-text-lg">cargando…</span></h1>
          <div class="actions">
            <button class="btn-sm js-export-csv">Exportar CSV</button>
            <button class="btn-sm js-refresh" aria-label="Actualizar lista">
              <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" style="vertical-align:-2px; margin-right:4px;" aria-hidden="true"><path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 4v4h-4M21 12a9 9 0 0 1-15 6.7L3 16M3 20v-4h4"/></svg>
              Actualizar
            </button>
            <button class="btn-sm js-logout" title="Borrar credenciales guardadas" aria-label="Cerrar acceso">
              <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" style="vertical-align:-2px; margin-right:4px;" aria-hidden="true"><path d="M10 17l-5-5 5-5M5 12h12M14 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4"/></svg>
              Cerrar acceso
            </button>
          </div>
        </div>

        <div class="kpis">
          <div class="kpi">
            <div class="kpi__label">Suscriptores totales</div>
            <div class="kpi__value js-k-total">—</div>
            <div class="kpi__delta js-k-total-sub">—</div>
          </div>
          <div class="kpi">
            <div class="kpi__label">Esta semana</div>
            <div class="kpi__value js-k-week">—</div>
            <div class="kpi__delta">últimos 7 días</div>
          </div>
          <div class="kpi">
            <div class="kpi__label">Este mes</div>
            <div class="kpi__value js-k-month">—</div>
            <div class="kpi__delta">últimos 30 días</div>
          </div>
          <div class="kpi">
            <div class="kpi__label">Origen principal</div>
            <div class="kpi__value js-k-origen" style="font-size: 22px;">—</div>
            <div class="kpi__delta js-k-origen-sub">—</div>
          </div>
        </div>

        <div class="admin-toolbar">
          <div class="admin-toolbar__filters">
            <input type="search" class="js-search u-w-full" placeholder="Buscar por email…" style="max-width: 320px; padding: 8px 12px; border: 1px solid var(--color-line, #E5E1DA); font-size: 14px;">
          </div>
          <select class="js-orden" style="padding: 8px 12px; border: 1px solid var(--color-line, #E5E1DA); font-size: 14px;">
            <option value="desc">Más nuevos primero</option>
            <option value="asc">Más antiguos primero</option>
          </select>
        </div>

        <div class="js-table-wrap">
          <table class="nl-table" aria-busy="true"><thead><tr><th>Email</th><th>Origen</th><th>Suscripto</th><th></th></tr></thead>
          <tbody>
            <tr class="skel-row"><td><span class="skel skel--line skel--text-md"></span></td><td><span class="skel skel--pill"></span></td><td><span class="skel skel--line skel--text-sm"></span></td><td></td></tr>
            <tr class="skel-row"><td><span class="skel skel--line skel--text-md"></span></td><td><span class="skel skel--pill"></span></td><td><span class="skel skel--line skel--text-sm"></span></td><td></td></tr>
            <tr class="skel-row"><td><span class="skel skel--line skel--text-md"></span></td><td><span class="skel skel--pill"></span></td><td><span class="skel skel--line skel--text-sm"></span></td><td></td></tr>
          </tbody></table>
        </div>

      </main>
    </div>
  </div>

  <!-- Modal de password -->
  <div class="nl-modal js-modal">
    <div class="nl-modal__inner">
      <h2>Acceso al panel</h2>
      <p>Ingresá tu password de admin para ver los suscriptores. Se guarda en este navegador para no pedirlo cada vez.</p>
      <div class="nl-error js-modal-error" style="display:none;"></div>
      <input type="password" class="js-pass-input" placeholder="••••••••" autocomplete="current-password">
      <div class="nl-modal__actions">
        <button class="btn-sm btn-sm--primary js-pass-save">Entrar</button>
      </div>
    </div>
  </div>

  <script src="js/admin-data-2026-05-15.js"></script>
  <script src="js/admin-shell-2026-05-15.js"></script>
  <script>
    (function() {
      const API_ENDPOINT = '/api/newsletter';
      const STORAGE_KEY  = 'momar_admin_pass';

      let adminPass = null;
      let registros = [];

      // ===== Modal de password =====
      const modal = document.querySelector('.js-modal');
      const modalInput = document.querySelector('.js-pass-input');
      const modalError = document.querySelector('.js-modal-error');
      const modalSave  = document.querySelector('.js-pass-save');

      function openModal() { modal.classList.add('is-open'); setTimeout(() => modalInput.focus(), 100); }
      function closeModal() { modal.classList.remove('is-open'); modalError.style.display = 'none'; modalInput.value = ''; }
      function showError(msg) { modalError.textContent = msg; modalError.style.display = 'block'; }

      modalSave.addEventListener('click', () => trySave(modalInput.value.trim()));
      modalInput.addEventListener('keydown', e => { if (e.key === 'Enter') trySave(modalInput.value.trim()); });

      async function trySave(pass) {
        if (!pass) { showError('Ingresá el password.'); return; }
        modalSave.disabled = true; modalSave.textContent = 'Verificando…';
        try {
          const r = await fetch(API_ENDPOINT, { headers: { 'X-Admin-Password': pass } });
          if (r.status === 401) throw new Error('Password incorrecto.');
          if (r.status === 500) {
            const body = await r.json();
            throw new Error(body.error || 'Error de servidor.');
          }
          if (!r.ok) throw new Error('Error ' + r.status);
          localStorage.setItem(STORAGE_KEY, pass);
          adminPass = pass;
          closeModal();
          init();
        } catch (e) {
          showError(e.message);
        } finally {
          modalSave.disabled = false; modalSave.textContent = 'Entrar';
        }
      }

      // ===== Init =====
      function init() {
        adminPass = localStorage.getItem(STORAGE_KEY);
        if (!adminPass) { openModal(); return; }
        loadRegistros();
      }

      async function loadRegistros() {
        const wrap = document.querySelector('.js-table-wrap');
        wrap.innerHTML = '<div class="nl-loading">Cargando suscriptores…</div>';
        try {
          const r = await fetch(API_ENDPOINT, { headers: { 'X-Admin-Password': adminPass } });
          if (r.status === 401) {
            localStorage.removeItem(STORAGE_KEY);
            adminPass = null;
            openModal();
            return;
          }
          if (!r.ok) throw new Error('Error ' + r.status);
          registros = await r.json();
          renderKPIs();
          renderTabla();
        } catch (e) {
          wrap.innerHTML = '<div class="a-empty"><div class="a-empty__icon"><svg viewBox="0 0 64 64" aria-hidden="true"><circle cx="32" cy="32" r="26"/><path d="M32 20v14M32 40v.5"/></svg></div><h3>No pude traer los suscriptores</h3><p>' + escapeHTML(e.message || String(e)) + '</p><div class="a-empty__actions"><button class="btn-sm js-relogin">Re-ingresar password</button></div></div>';
          document.querySelector('.js-relogin')?.addEventListener('click', () => {
            localStorage.removeItem(STORAGE_KEY);
            init();
          });
        }
      }

      function renderKPIs() {
        const now = Date.now();
        const oneWeek = 7 * 24 * 60 * 60 * 1000;
        const oneMonth = 30 * 24 * 60 * 60 * 1000;
        const week = registros.filter(r => now - new Date(r.created_at).getTime() < oneWeek).length;
        const month = registros.filter(r => now - new Date(r.created_at).getTime() < oneMonth).length;
        document.querySelector('.js-k-total').textContent = registros.length;
        document.querySelector('.js-k-total-sub').textContent = registros.length === 0 ? 'aún sin suscriptores' : 'desde el inicio';
        document.querySelector('.js-k-week').textContent = week;
        document.querySelector('.js-k-month').textContent = month;
        document.querySelector('.js-total-count').textContent = '(' + registros.length + ')';

        // Origen principal
        const origenes = {};
        registros.forEach(r => { const o = r.origen || 'desconocido'; origenes[o] = (origenes[o] || 0) + 1; });
        const top = Object.entries(origenes).sort((a, b) => b[1] - a[1])[0];
        if (top) {
          document.querySelector('.js-k-origen').textContent = top[0];
          document.querySelector('.js-k-origen-sub').textContent = top[1] + ' de ' + registros.length;
        } else {
          document.querySelector('.js-k-origen').textContent = '—';
          document.querySelector('.js-k-origen-sub').textContent = 'sin datos';
        }
      }

      function renderTabla() {
        const wrap = document.querySelector('.js-table-wrap');
        const filtro = (document.querySelector('.js-search').value || '').toLowerCase().trim();
        const orden = document.querySelector('.js-orden').value;
        let lista = registros.filter(r => !filtro || (r.email || '').toLowerCase().includes(filtro));
        lista.sort((a, b) => {
          const t = new Date(a.created_at) - new Date(b.created_at);
          return orden === 'asc' ? t : -t;
        });
        if (lista.length === 0) {
          const icon = '<div class="a-empty__icon"><svg viewBox="0 0 64 64" aria-hidden="true"><path d="M10 18h44v28a2 2 0 0 1-2 2H12a2 2 0 0 1-2-2V18Z"/><path d="m10 18 22 18 22-18M10 48l16-16M54 48 38 32"/></svg></div>';
          if (registros.length === 0) {
            wrap.innerHTML = '<div class="a-empty">' + icon + '<h3>Todavía no hay suscriptoras</h3><p>Cuando alguien se suscriba desde el form de la home, aparece acá.</p></div>';
          } else {
            wrap.innerHTML = '<div class="a-empty">' + icon + '<h3>Sin resultados</h3><p>No hay suscriptoras que coincidan con esa búsqueda.</p></div>';
          }
          return;
        }
        const rows = lista.map(r => `
          <tr data-id="${r.id}">
            <td><span class="nl-email">${escapeHTML(r.email)}</span></td>
            <td><span class="nl-fecha">${fmtFecha(r.created_at)}</span></td>
            <td><span class="nl-origen">${escapeHTML(r.origen || 'desconocido')}</span></td>
            <td><span class="nl-ua" title="${escapeHTML(r.user_agent || '')}">${escapeHTML(r.user_agent || '—')}</span></td>
            <td class="nl-actions"><button class="nl-btn-del js-del">Eliminar</button></td>
          </tr>
        `).join('');
        wrap.innerHTML = `
          <table class="nl-table">
            <thead><tr>
              <th>Email</th><th>Fecha</th><th>Origen</th><th>User agent</th><th></th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        `;
        wrap.querySelectorAll('.js-del').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const tr = e.target.closest('tr');
            const id = tr.dataset.id;
            const email = tr.querySelector('.nl-email').textContent;
            if (!confirm('¿Eliminar a ' + email + ' del newsletter?')) return;
            tr.classList.add('is-deleting');
            try {
              const r = await fetch(API_ENDPOINT + '?id=' + encodeURIComponent(id), {
                method: 'DELETE',
                headers: { 'X-Admin-Password': adminPass }
              });
              if (!r.ok) throw new Error('Error ' + r.status);
              registros = registros.filter(x => x.id !== id);
              renderKPIs();
              renderTabla();
            } catch (err) {
              tr.classList.remove('is-deleting');
              alert('No se pudo eliminar: ' + err.message);
            }
          });
        });
      }

      function fmtFecha(iso) {
        const d = new Date(iso);
        const f = d.toLocaleDateString('es-PY', { day: '2-digit', month: 'short', year: 'numeric' });
        const h = d.toLocaleTimeString('es-PY', { hour: '2-digit', minute: '2-digit' });
        return f + ' · ' + h;
      }
      function escapeHTML(s) {
        return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
      }

      // ===== Toolbar =====
      document.querySelector('.js-search').addEventListener('input', () => renderTabla());
      document.querySelector('.js-orden').addEventListener('change', () => renderTabla());
      document.querySelector('.js-refresh').addEventListener('click', () => loadRegistros());

      document.querySelector('.js-logout').addEventListener('click', () => {
        if (!confirm('¿Borrar el password guardado en este navegador?')) return;
        localStorage.removeItem(STORAGE_KEY);
        adminPass = null; registros = [];
        document.querySelector('.js-table-wrap').innerHTML = '<div class="nl-loading">Esperando password…</div>';
        document.querySelector('.js-k-total').textContent = '—';
        openModal();
      });

      document.querySelector('.js-export-csv').addEventListener('click', () => {
        if (registros.length === 0) { alert('No hay suscriptores para exportar.'); return; }
        const cols = ['email', 'created_at', 'origen', 'user_agent'];
        const csv = [
          cols.join(','),
          ...registros.map(r => cols.map(c => `"${String(r[c] || '').replace(/"/g, '""')}"`).join(','))
        ].join('\n');
        const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'momar-newsletter-' + new Date().toISOString().slice(0, 10) + '.csv';
        a.click();
        URL.revokeObjectURL(url);
      });

      init();
    })();
  </script>
</body>
</html>
