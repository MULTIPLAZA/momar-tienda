<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos · MoMar Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css?v=3">
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-side"></aside>
    <div>
      <div class="admin-topbar"></div>
      <main class="admin-main">

        <div class="admin-main__head">
          <h1>Pedidos <span style="color: var(--color-text-soft); font-weight: 400; font-size: 14px;" class="js-total-count">cargando…</span></h1>
          <div class="actions">
            <button class="btn-sm">Exportar CSV</button>
            <button class="btn-sm btn-sm--primary">+ Pedido manual</button>
          </div>
        </div>

        <div class="admin-toolbar">
          <div class="admin-toolbar__filters">
            <select>
              <option>Estado pago: Todos</option>
              <option>Pagado</option>
              <option>A confirmar</option>
              <option>Pendiente</option>
              <option>Reembolsado</option>
            </select>
            <select>
              <option>Estado envío: Todos</option>
              <option>Pendiente</option>
              <option>Preparado</option>
              <option>Enviado</option>
              <option>Entregado</option>
              <option>Devuelto</option>
            </select>
            <select>
              <option>Período: Últimos 30 días</option>
              <option>Hoy</option>
              <option>Esta semana</option>
              <option>Este mes</option>
              <option>Personalizado</option>
            </select>
            <input type="text" placeholder="Buscar #, cliente, CDC…" style="width: 260px;">
          </div>
          <div>
            <select>
              <option>Ordenar: Más recientes</option>
              <option>Total: mayor a menor</option>
              <option>Total: menor a mayor</option>
            </select>
          </div>
        </div>

        <div class="admin-table-wrap" style="background: var(--color-bg);">
          <table class="admin-table">
            <thead>
              <tr>
                <th style="width: 30px;"><input type="checkbox"></th>
                <th>Pedido</th>
                <th>Fecha</th>
                <th>Clienta</th>
                <th class="col-hide-sm">Items</th>
                <th class="col-num">Total</th>
                <th>Pago</th>
                <th>Envío</th>
                <th class="col-hide-sm">CDC SIFEN</th>
                <th class="col-actions">Acciones</th>
              </tr>
            </thead>
            <tbody class="js-pedidos-tbody"></tbody>
          </table>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-top: var(--space-3); font-size: 12px; color: var(--color-text-soft);">
          <div>Mostrando 1-8 de 8 pedidos</div>
          <div style="display:flex; gap: 4px;">
            <button class="btn-sm btn-sm--ghost" disabled>← Anterior</button>
            <button class="btn-sm btn-sm--ghost" disabled>Siguiente →</button>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="../js/products.js?v=1"></script>
  <script src="js/admin-data.js?v=1"></script>
  <script src="js/admin-shell.js?v=1"></script>
  <script>
    MOMAR_renderAdminShell('pedidos.html', 'Pedidos');
    const fmt = window.MOMAR_fmtGs;
    const peds = window.MOMAR_PEDIDOS;
    document.querySelector('.js-total-count').textContent = `· ${peds.length} en total`;
    document.querySelector('.js-pedidos-tbody').innerHTML = peds.map(p => `
      <tr>
        <td><input type="checkbox"></td>
        <td><a href="pedido.html?n=${p.num.replace('#','')}"><strong>${p.num}</strong></a></td>
        <td>${p.fecha}</td>
        <td><strong>${p.cliente}</strong><br><span style="font-size: 11px; color: var(--color-text-soft);">${p.whatsapp}</span></td>
        <td class="col-hide-sm">${p.items}</td>
        <td class="col-num"><strong>${fmt(p.total)}</strong></td>
        <td>${window.MOMAR_pillPago(p.pagoEstado)}<br><span style="font-size: 11px; color: var(--color-text-soft);">${p.pago}</span></td>
        <td>${window.MOMAR_pillEnvio(p.envioEstado)}<br><span style="font-size: 11px; color: var(--color-text-soft);">${p.envio}</span></td>
        <td class="col-hide-sm"><span style="font-size: 11px; font-family: monospace; color: var(--color-text-soft);">${p.cdc ? p.cdc.substring(0, 16) + '…' : '—'}</span></td>
        <td class="col-actions">
          <a href="pedido.html?n=${p.num.replace('#','')}" class="btn-sm btn-sm--ghost">Ver →</a>
        </td>
      </tr>
    `).join('');
  </script>
</body>
</html>
