<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="momar-shell" content="full">
  <title>Catálogo · MoMar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=20260515t">
</head>
<body>
  <div class="js-shell-top"></div>

  <div class="container">
    <div class="breadcrumb"><a href="index.html">Inicio</a><span>/</span> Catálogo</div>

    <div class="section__head" style="text-align:left; margin-bottom: var(--space-4);">
      <span class="eyebrow">Categoría</span>
      <h1 style="font-style: italic; margin-bottom: var(--space-2);">Catálogo completo</h1>
      <p style="color: var(--color-text-soft); max-width: 600px;">Joyería en oro 18k, oro blanco y plata 925. Accesorios para el hogar curados de Italia, Francia y artesanos locales.</p>
    </div>

    <div class="catalogo-layout">
      <aside class="filtros">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--space-3);">
          <h3 style="margin:0;">Filtrar</h3>
          <button onclick="document.body.classList.remove('filters-open')" style="display:none; font-size:11px; letter-spacing:2px; text-transform:uppercase;" class="js-close-filters">Cerrar ×</button>
        </div>

        <div class="filtro-grupo" data-group="categoria">
          <h4>Categoría</h4>
          <label><input type="checkbox" value="anillos"> Anillos</label>
          <label><input type="checkbox" value="collares"> Collares</label>
          <label><input type="checkbox" value="aros"> Aros</label>
          <label><input type="checkbox" value="pulseras"> Pulseras</label>
          <label><input type="checkbox" value="hogar"> Hogar</label>
        </div>

        <div class="filtro-grupo" data-group="material">
          <h4>Material</h4>
          <label><input type="checkbox" value="oro 18k"> Oro 18k</label>
          <label><input type="checkbox" value="oro blanco"> Oro blanco</label>
          <label><input type="checkbox" value="plata 925"> Plata 925</label>
          <label><input type="checkbox" value="baño de oro"> Baño de oro</label>
          <label><input type="checkbox" value="mármol"> Mármol / cristal</label>
        </div>

        <div class="filtro-grupo" data-group="precio">
          <h4>Precio</h4>
          <label><input type="checkbox" value="0-1000000"> Hasta Gs 1.000.000</label>
          <label><input type="checkbox" value="1000000-3000000"> Gs 1.000.000 — 3.000.000</label>
          <label><input type="checkbox" value="3000000-6000000"> Gs 3.000.000 — 6.000.000</label>
          <label><input type="checkbox" value="6000000-"> Más de Gs 6.000.000</label>
        </div>

        <div class="filtro-grupo" data-group="disponibilidad">
          <h4>Disponibilidad</h4>
          <label><input type="checkbox" value="stock"> En stock</label>
          <label><input type="checkbox" value="unica"> Pieza única</label>
          <label><input type="checkbox" value="oferta"> En oferta</label>
        </div>
      </aside>

      <div>
        <div class="toolbar">
          <button class="toolbar__filter-btn" onclick="document.body.classList.add('filters-open')">Filtros</button>
          <span class="js-catalogo-count">Cargando…</span>
          <select class="js-orden">
            <option value="destacados">Ordenar: Destacados</option>
            <option value="precio-asc">Precio: menor a mayor</option>
            <option value="precio-desc">Precio: mayor a menor</option>
            <option value="nuevos">Más nuevos</option>
          </select>
        </div>

        <!-- Chips de filtros activos (#19) -->
        <div class="filtros-activos js-filtros-activos"></div>

        <div class="productos productos--lista js-grid-catalogo"></div>

        <div style="text-align: center; margin-top: var(--space-6);">
          <button class="btn btn--outline">Cargar más</button>
        </div>
      </div>
    </div>
  </div>

  <div class="js-shell-bottom"></div>

  <script src="js/supabase-config.js?v=20260515t"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/products.js?v=20260515t"></script>
  <script src="js/supabase-data.js?v=20260515t"></script>
  <script src="js/shell.js?v=20260515t"></script>
  <script src="js/cart.js?v=20260515t"></script>
  <script src="js/render.js?v=20260515t"></script>
  <script>
    // Chips de filtros activos (#19)
    function renderChips() {
      const c = document.querySelector('.js-filtros-activos');
      if (!c) return;
      const activos = [];
      document.querySelectorAll('.filtros input[type=checkbox]').forEach(ch => {
        if (ch.checked) {
          const label = ch.parentElement.textContent.trim().replace(/\s*\(\d+\)$/, '');
          activos.push({ el: ch, label });
        }
      });
      if (activos.length === 0) { c.innerHTML = ''; return; }
      c.innerHTML = activos.map((a, i) => `<span class="chip">${a.label}<button data-idx="${i}" aria-label="Quitar ${a.label}">×</button></span>`).join('')
        + '<button class="chip chip--clear" onclick="clearAllChips()">Limpiar todo</button>';
      c.querySelectorAll('.chip button').forEach((btn, i) => {
        btn.addEventListener('click', () => { activos[i].el.checked = false; renderChips(); });
      });
    }
    function clearAllChips() {
      document.querySelectorAll('.filtros input[type=checkbox]').forEach(ch => ch.checked = false);
      renderChips();
      if (window.MOMAR_renderCatalogo) window.MOMAR_renderCatalogo();
    }
    document.querySelectorAll('.filtros input[type=checkbox]').forEach(ch => {
      ch.addEventListener('change', () => {
        renderChips();
        if (window.MOMAR_renderCatalogo) window.MOMAR_renderCatalogo();
      });
    });
    document.querySelector('.js-orden')?.addEventListener('change', () => {
      if (window.MOMAR_renderCatalogo) window.MOMAR_renderCatalogo();
    });
    document.addEventListener('DOMContentLoaded', renderChips);
  </script>
</body>
</html>
