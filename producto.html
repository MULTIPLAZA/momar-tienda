<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="momar-shell" content="full">
  <title>Producto · MoMar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=20260515s">
</head>
<body>
  <div class="js-shell-top"></div>

  <div class="container">
    <div class="breadcrumb">
      <a href="index.html">Inicio</a><span>/</span><a href="catalogo.html" class="js-prod-breadcrumb-cat">Catálogo</a><span>/</span> <span class="js-prod-breadcrumb-nombre">…</span>
    </div>

    <div class="producto-detalle js-producto-detalle">
      <div>
        <div class="galeria__principal js-galeria-principal"></div>
        <div class="galeria__thumbs js-galeria-thumbs"></div>
      </div>

      <div class="producto-info">
        <div class="eyebrow js-prod-eyebrow">…</div>
        <h1 class="js-prod-nombre">…</h1>
        <div class="precio js-prod-precio">…</div>

        <p class="descripcion js-prod-descripcion">…</p>

        <div class="variantes js-prod-variantes"></div>

        <div style="margin-bottom: var(--space-3);">
          <div class="variantes__label">Cantidad</div>
          <div class="cantidad">
            <button aria-label="Quitar uno" onclick="const i = this.nextElementSibling; i.value = Math.max(1, (parseInt(i.value)||1) - 1); i.dispatchEvent(new Event('input'));">−</button>
            <input type="text" inputmode="numeric" pattern="[0-9]*" value="1" id="prod-qty" aria-label="Cantidad"
              oninput="this.value = Math.max(1, parseInt(this.value.replace(/\D/g,''))||1); document.querySelectorAll('.js-add-this-product').forEach(b => b.dataset.qty = this.value);">
            <button aria-label="Agregar uno" onclick="const i = this.previousElementSibling; i.value = (parseInt(i.value)||1) + 1; i.dispatchEvent(new Event('input'));">+</button>
          </div>
        </div>

        <div class="acciones">
          <button class="btn btn--primary js-add-this-product" data-qty="1">Agregar al carrito</button>
          <button class="btn btn--outline">♡ Guardar</button>
        </div>

        <div style="margin-top: var(--space-4); padding: var(--space-3); background: var(--color-bg-alt); font-size: 13px;">
          <strong style="font-family: var(--font-display);">3 cuotas sin interés</strong>
          de <strong class="js-prod-cuota">…</strong> con tarjetas Bancard · o pagá hasta 12 cuotas.
        </div>

        <div style="margin-top: var(--space-5);" class="js-prod-atributos"></div>

        <div class="beneficios">
          <div class="beneficio"><strong>Envío</strong><span>Asunción 24 hs · Interior 3-5 días</span></div>
          <div class="beneficio"><strong>Cambios</strong><span>15 días · sin costo</span></div>
          <div class="beneficio"><strong>Garantía</strong><span>De por vida en oro 18k</span></div>
        </div>
      </div>
    </div>
  </div>

  <section class="section section--alt">
    <div class="container">
      <div class="section__head">
        <span class="eyebrow">Para complementar</span>
        <h2>Te puede gustar</h2>
      </div>
      <div class="productos js-grid-relacionados"></div>
    </div>
  </section>

  <div class="sticky-add-bar">
    <div class="sticky-add-bar__info">
      <div class="sticky-add-bar__nombre js-prod-nombre">…</div>
      <div class="sticky-add-bar__precio js-prod-precio">…</div>
    </div>
    <button class="btn btn--primary js-add-this-product" data-qty="1">Agregar</button>
  </div>

  <div class="js-shell-bottom"></div>

  <script src="js/supabase-config.js?v=20260515s"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/products.js?v=20260515s"></script>
  <script src="js/supabase-data.js?v=20260515s"></script>
  <script src="js/shell.js?v=20260515s"></script>
  <script src="js/cart.js?v=20260515s"></script>
  <script src="js/render.js?v=20260515s"></script>
</body>
</html>
