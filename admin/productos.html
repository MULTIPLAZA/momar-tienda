<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F0F0F">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Productos · MoMar Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin-2026-05-15.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-side"></aside>
    <div>
      <div class="admin-topbar"></div>
      <main class="admin-main">

        <div class="admin-main__head">
          <h1>Productos <span class="js-total-count u-text-soft u-fw-400 u-text-lg">cargando…</span></h1>
          <div class="actions">
            <button class="btn-sm js-export-csv">Exportar CSV</button>
            <a href="producto-edit.html" class="btn-sm btn-sm--primary">+ Producto nuevo</a>
          </div>
        </div>

        <div class="admin-toolbar">
          <div class="admin-toolbar__filters">
            <select class="js-filtro-cat">
              <option value="">Categoría: Todas</option>
            </select>
            <select class="js-filtro-estado">
              <option value="">Estado: Todos</option>
              <option value="publicado">Publicado</option>
              <option value="borrador">Borrador</option>
              <option value="oculto">Oculto</option>
            </select>
            <input type="search" class="js-buscar u-w-full" placeholder="Buscar SKU o nombre…" style="max-width: 280px;">
          </div>
          <div>
            <select class="js-orden">
              <option value="created_at.desc">Más nuevos primero</option>
              <option value="created_at.asc">Más antiguos primero</option>
              <option value="precio_gs.desc">Precio: mayor</option>
              <option value="precio_gs.asc">Precio: menor</option>
              <option value="nombre.asc">Nombre A-Z</option>
            </select>
          </div>
        </div>

        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th style="width: 30px;"><input type="checkbox" class="js-check-all" aria-label="Seleccionar todos"></th>
                <th></th>
                <th data-sort="text">Producto</th>
                <th class="col-hide-sm" data-sort="text">SKU</th>
                <th class="col-hide-sm" data-sort="text">Categoría</th>
                <th class="col-num" data-sort="num">Precio</th>
                <th class="col-num" data-sort="num">Stock</th>
                <th data-sort="text">Estado</th>
                <th class="col-actions">Acciones</th>
              </tr>
            </thead>
            <tbody class="js-productos-tbody"></tbody>
          </table>
        </div>

        <div class="u-flex u-items-center u-gap-2 u-mt-3 js-bulk-bar" style="display:none;">
          <span class="u-text-base u-text-soft u-mr-2">Con <strong class="js-bulk-count">0</strong> seleccionados:</span>
          <button class="btn-sm btn-sm--ghost js-bulk-publicar">Publicar</button>
          <button class="btn-sm btn-sm--ghost js-bulk-ocultar">Ocultar</button>
          <button class="btn-sm btn-sm--ghost btn-sm--danger js-bulk-eliminar">Eliminar</button>
        </div>

      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/admin-data-2026-05-15.js"></script>
  <script src="js/admin-shell-2026-05-15.js"></script>
  <script>
    MOMAR_renderAdminShell('productos.html', 'Productos');

    (async function() {
      await window.MOMAR_AUTH_READY;
      const supa = window.MOMAR_supabase;
      const fmt = window.MOMAR_fmtGs;
      const tbody = document.querySelector('.js-productos-tbody');
      const totalCount = document.querySelector('.js-total-count');

      // Cargar categorías para el select
      const { data: cats } = await supa.from('categorias').select('slug,nombre').order('orden');
      const catSel = document.querySelector('.js-filtro-cat');
      (cats || []).forEach(c => {
        const o = document.createElement('option');
        o.value = c.slug; o.textContent = c.nombre;
        catSel.appendChild(o);
      });

      const filtros = {
        cat: '', estado: '', buscar: '',
        orden: 'created_at.desc',
      };

      const filtroCat = document.querySelector('.js-filtro-cat');
      const filtroEstado = document.querySelector('.js-filtro-estado');
      const buscar = document.querySelector('.js-buscar');
      const orden = document.querySelector('.js-orden');

      [filtroCat, filtroEstado, buscar, orden].forEach(el => {
        el.addEventListener(el.tagName === 'INPUT' ? 'input' : 'change', () => {
          filtros.cat = filtroCat.value;
          filtros.estado = filtroEstado.value;
          filtros.buscar = buscar.value.trim();
          filtros.orden = orden.value;
          cargar();
        });
      });

      function skel() {
        return Array(6).fill(0).map(() => `
          <tr class="skel-row">
            <td><input type="checkbox" disabled aria-label="Cargando"></td>
            <td class="col-mini-img"><span class="skel skel--img"></span></td>
            <td><span class="skel skel--line skel--text-md"></span><span class="skel skel--line skel--text-sm"></span></td>
            <td class="col-hide-sm"><span class="skel skel--line skel--text-sm"></span></td>
            <td class="col-hide-sm"><span class="skel skel--line skel--text-sm"></span></td>
            <td class="col-num"><span class="skel skel--line skel--text-sm" style="margin-left:auto;width:60px;"></span></td>
            <td class="col-num"><span class="skel skel--pill" style="margin-left:auto;"></span></td>
            <td><span class="skel skel--pill"></span></td>
            <td class="col-actions"></td>
          </tr>
        `).join('');
      }

      function pillStock(stock) {
        if (stock === 0) return '<span class="pill pill--red">Sin stock</span>';
        if (stock <= 2) return '<span class="pill pill--amber">Stock bajo · ' + stock + '</span>';
        return '<span class="pill pill--green">' + stock + ' unid.</span>';
      }
      function pillEstado(estado, stock) {
        if (estado === 'borrador') return '<span class="pill pill--gray">Borrador</span>';
        if (estado === 'oculto') return '<span class="pill pill--gray">Oculto</span>';
        if (stock === 0) return '<span class="pill pill--red">Sin stock</span>';
        return '<span class="pill pill--green">Publicado</span>';
      }

      async function cargar() {
        tbody.innerHTML = skel();
        totalCount.textContent = 'cargando…';

        let q = supa
          .from('productos')
          .select('id,sku,nombre,precio_gs,precio_antes_gs,stock,estado,material,created_at,categoria:categorias(slug,nombre),fotos:producto_fotos(url,es_principal,orden)', { count: 'exact' });

        if (filtros.cat)    q = q.eq('categoria.slug', filtros.cat);
        if (filtros.estado) q = q.eq('estado', filtros.estado);
        if (filtros.buscar) q = q.or('sku.ilike.%' + filtros.buscar + '%,nombre.ilike.%' + filtros.buscar + '%');

        const [col, dir] = filtros.orden.split('.');
        q = q.order(col, { ascending: dir === 'asc' });

        const { data, error, count } = await q.limit(200);
        if (error) {
          tbody.innerHTML = `<tr><td colspan="9"><div class="a-empty"><div class="a-empty__icon"><svg viewBox="0 0 64 64" aria-hidden="true"><circle cx="32" cy="32" r="26"/><path d="M32 20v14M32 40v.5"/></svg></div><h3>No se pudieron cargar los productos</h3><p>${escapeHTML(error.message || '')}</p></div></td></tr>`;
          totalCount.textContent = '';
          window.MOMAR_toast && window.MOMAR_toast('Error al cargar productos', { kind: 'err' });
          return;
        }

        totalCount.textContent = '· ' + (count ?? data.length) + ' productos';

        if (!data || data.length === 0) {
          const noFilters = !filtros.cat && !filtros.estado && !filtros.buscar;
          tbody.innerHTML = `<tr><td colspan="9"><div class="a-empty">
            <div class="a-empty__icon">
              <svg viewBox="0 0 64 64" aria-hidden="true">
                <path d="M52 18 32 8 12 18v28l20 10 20-10V18Z"/>
                <path d="m12 18 20 10 20-10M32 28v28"/>
              </svg>
            </div>
            <h3>${noFilters ? 'Todavía no hay productos' : 'Ningún producto coincide con los filtros'}</h3>
            <p>${noFilters ? 'Cargá tu primer producto y empezamos a vestir el catálogo.' : 'Probá ajustar los filtros o limpiar la búsqueda.'}</p>
            <div class="a-empty__actions">
              ${noFilters ? '<a href="producto-edit.html" class="btn-sm btn-sm--primary">+ Producto nuevo</a>' : '<button class="btn-sm js-clear-filters">Limpiar filtros</button>'}
            </div>
          </div></td></tr>`;
          document.querySelector('.js-clear-filters')?.addEventListener('click', () => {
            filtroCat.value = ''; filtroEstado.value = ''; buscar.value = '';
            filtros.cat = ''; filtros.estado = ''; filtros.buscar = '';
            cargar();
          });
          return;
        }

        tbody.innerHTML = data.map(p => {
          const cat = p.categoria || {};
          const fotos = (p.fotos || []).sort((a, b) => (a.orden || 0) - (b.orden || 0));
          const principal = fotos.find(f => f.es_principal) || fotos[0];
          const url = principal ? principal.url : '';
          return `
            <tr data-id="${p.id}" data-sku="${escapeHTML(p.sku)}" data-nombre="${escapeHTML(p.nombre || '')}">
              <td><input type="checkbox" class="js-row-check" data-id="${p.id}"></td>
              <td class="col-mini-img">${url ? `<img src="${url}" onerror="this.style.opacity=0;">` : '<div style="width:48px;height:48px;background:#F4F4F4;"></div>'}</td>
              <td>
                <a href="producto-edit.html?sku=${encodeURIComponent(p.sku)}"><strong>${escapeHTML(p.nombre || '(sin nombre)')}</strong></a>
                <div class="u-text-sm u-text-soft u-mt-1">${escapeHTML(p.material || '')}</div>
              </td>
              <td class="col-hide-sm"><span class="u-text-base" style="font-family: monospace;">${escapeHTML(p.sku)}</span></td>
              <td class="col-hide-sm">${escapeHTML(cat.nombre || '—')}</td>
              <td class="col-num">
                <strong>${fmt(p.precio_gs)}</strong>
                ${p.precio_antes_gs ? '<br><del class="u-text-sm u-text-soft">' + fmt(p.precio_antes_gs) + '</del>' : ''}
              </td>
              <td class="col-num">${pillStock(p.stock || 0)}</td>
              <td>${pillEstado(p.estado, p.stock || 0)}</td>
              <td class="col-actions">
                <a href="producto-edit.html?sku=${encodeURIComponent(p.sku)}" class="btn-sm btn-sm--ghost">Editar</a>
                <a href="../producto.html?sku=${encodeURIComponent(p.sku)}" target="_blank" rel="noopener" class="icon-btn" aria-label="Ver en la tienda" title="Ver en la tienda">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 4h6v6M20 4l-9 9M10 6H5a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-5"/></svg>
                </a>
              </td>
            </tr>
          `;
        }).join('');
      }

      function escapeHTML(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
      }

      // ===== Selección de filas (checkboxes) =====
      const bulkBar = document.querySelector('.js-bulk-bar');
      const bulkCount = document.querySelector('.js-bulk-count');
      const checkAll = document.querySelector('.js-check-all');

      function selectedIds() {
        return Array.from(document.querySelectorAll('.js-row-check:checked')).map(c => c.dataset.id);
      }
      function refreshBulkBar() {
        const n = selectedIds().length;
        bulkCount.textContent = n;
        bulkBar.style.display = n > 0 ? '' : 'none';
        // Sync el check-all del header
        const total = document.querySelectorAll('.js-row-check').length;
        if (total > 0) {
          checkAll.checked = n === total;
          checkAll.indeterminate = n > 0 && n < total;
        }
      }
      tbody.addEventListener('change', e => {
        if (e.target.classList.contains('js-row-check')) refreshBulkBar();
      });
      checkAll.addEventListener('change', () => {
        document.querySelectorAll('.js-row-check').forEach(c => c.checked = checkAll.checked);
        refreshBulkBar();
      });

      // ===== Bulk: cambiar estado masivo =====
      async function bulkUpdateEstado(estado, labelAccion) {
        const ids = selectedIds();
        if (ids.length === 0) return;
        if (!confirm('¿' + labelAccion + ' ' + ids.length + ' producto(s)?')) return;
        const { error } = await supa.from('productos').update({ estado }).in('id', ids);
        if (error) {
          window.MOMAR_toast && window.MOMAR_toast('Error: ' + error.message, { kind: 'err' });
          return;
        }
        window.MOMAR_toast && window.MOMAR_toast(ids.length + ' producto(s) ' + labelAccion.toLowerCase() + 'do(s)', { kind: 'ok' });
        await cargar();
      }
      document.querySelector('.js-bulk-publicar').addEventListener('click', () => bulkUpdateEstado('publicado', 'Publicar'));
      document.querySelector('.js-bulk-ocultar').addEventListener('click', () => bulkUpdateEstado('oculto', 'Ocultar'));

      // ===== Bulk: eliminar =====
      document.querySelector('.js-bulk-eliminar').addEventListener('click', async () => {
        const ids = selectedIds();
        if (ids.length === 0) return;
        if (!confirm('¿Eliminar definitivamente ' + ids.length + ' producto(s)? Se borran también sus fotos asociadas. Esta acción no se puede deshacer.')) return;

        // Borrar fotos del storage primero (para no dejar huérfanas)
        try {
          const { data: fotos } = await supa.from('producto_fotos').select('url').in('producto_id', ids);
          if (fotos && fotos.length > 0) {
            const keys = fotos.map(f => {
              const m = (f.url || '').match(/\/productos\/(.+)$/);
              return m ? m[1] : null;
            }).filter(Boolean);
            if (keys.length > 0) await supa.storage.from('productos').remove(keys).catch(() => {});
          }
        } catch (e) { /* no crítico */ }

        const { error } = await supa.from('productos').delete().in('id', ids);
        if (error) {
          window.MOMAR_toast && window.MOMAR_toast('Error: ' + error.message, { kind: 'err' });
          return;
        }
        window.MOMAR_toast && window.MOMAR_toast(ids.length + ' producto(s) eliminado(s)', { kind: 'ok' });
        await cargar();
      });

      // ===== Exportar CSV =====
      document.querySelector('.js-export-csv').addEventListener('click', async () => {
        // Re-fetch sin paginar para exportar todo (no solo los 200 visibles)
        const { data, error } = await supa
          .from('productos')
          .select('sku,nombre,descripcion_corta,precio_gs,precio_antes_gs,costo_gs,stock,es_unica,estado,material,peso_gr,origen,certificado,created_at,categoria:categorias(nombre)')
          .order('created_at', { ascending: false });
        if (error) {
          window.MOMAR_toast && window.MOMAR_toast('Error: ' + error.message, { kind: 'err' });
          return;
        }
        if (!data || data.length === 0) {
          window.MOMAR_toast && window.MOMAR_toast('No hay productos para exportar', { kind: 'err' });
          return;
        }
        const cols = ['sku', 'nombre', 'descripcion_corta', 'categoria', 'precio_gs', 'precio_antes_gs', 'costo_gs', 'stock', 'es_unica', 'estado', 'material', 'peso_gr', 'origen', 'certificado', 'created_at'];
        const filas = data.map(p => {
          const row = { ...p, categoria: p.categoria?.nombre || '' };
          return cols.map(k => `"${String(row[k] == null ? '' : row[k]).replace(/"/g, '""')}"`).join(',');
        });
        const csv = [cols.join(','), ...filas].join('\n');
        const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
        const u = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = u;
        a.download = 'momar-productos-' + new Date().toISOString().slice(0, 10) + '.csv';
        a.click();
        URL.revokeObjectURL(u);
        window.MOMAR_toast && window.MOMAR_toast(data.length + ' productos exportados a CSV', { kind: 'ok' });
      });

      cargar();
    })();
  </script>
  <script src="js/pwa.js"></script>
</body>
</html>
